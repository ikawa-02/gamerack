<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#1a1530"/>
  <!-- Row 0: shoulder bumps -->
  <rect x="8"  y="6"  width="6" height="2" fill="#7b5cff"/>
  <rect x="18" y="6"  width="6" height="2" fill="#7b5cff"/>
  <!-- Row 1: upper body -->
  <rect x="4"  y="8"  width="24" height="2" fill="#7b5cff"/>
  <!-- Row 2: wide body -->
  <rect x="2"  y="10" width="28" height="2" fill="#7b5cff"/>
  <!-- Row 3: d-pad up + buttons -->
  <rect x="0"  y="12" width="8"  height="2" fill="#7b5cff"/>
  <rect x="8"  y="12" width="2"  height="2" fill="#ffffff"/>
  <rect x="12" y="12" width="8"  height="2" fill="#7b5cff"/>
  <rect x="22" y="12" width="2"  height="2" fill="#ffffff"/>
  <rect x="26" y="12" width="2"  height="2" fill="#ffffff"/>
  <rect x="28" y="12" width="4"  height="2" fill="#7b5cff"/>
  <!-- Row 4: d-pad horizontal + buttons -->
  <rect x="0"  y="14" width="6"  height="2" fill="#7b5cff"/>
  <rect x="6"  y="14" width="6"  height="2" fill="#ffffff"/>
  <rect x="12" y="14" width="8"  height="2" fill="#7b5cff"/>
  <rect x="20" y="14" width="8"  height="2" fill="#ffffff"/>
  <rect x="28" y="14" width="4"  height="2" fill="#7b5cff"/>
  <!-- Row 5: d-pad down + buttons -->
  <rect x="0"  y="16" width="8"  height="2" fill="#7b5cff"/>
  <rect x="8"  y="16" width="2"  height="2" fill="#ffffff"/>
  <rect x="12" y="16" width="8"  height="2" fill="#7b5cff"/>
  <rect x="22" y="16" width="2"  height="2" fill="#ffffff"/>
  <rect x="26" y="16" width="2"  height="2" fill="#ffffff"/>
  <rect x="28" y="16" width="4"  height="2" fill="#7b5cff"/>
  <!-- Row 6: full width -->
  <rect x="0"  y="18" width="32" height="2" fill="#7b5cff"/>
  <!-- Row 7: narrow body -->
  <rect x="2"  y="20" width="28" height="2" fill="#7b5cff"/>
  <!-- Row 8: grips -->
  <rect x="2"  y="22" width="6"  height="2" fill="#7b5cff"/>
  <rect x="24" y="22" width="6"  height="2" fill="#7b5cff"/>
  <!-- Row 9: grip tips -->
  <rect x="4"  y="24" width="4"  height="2" fill="#7b5cff"/>
  <rect x="24" y="24" width="4"  height="2" fill="#7b5cff"/>
</svg>
